name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            build_flag: --linux
            artifact_name: linux
          - os: windows-2022
            build_flag: --win
            artifact_name: windows
          - os: macos-14
            build_flag: --mac
            artifact_name: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-builder ${{ matrix.build_flag }} --publish never
        continue-on-error: ${{ matrix.os == 'macos-14' || matrix.os == 'windows-2022' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: builds-${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: warn

  release:
    needs: [build]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: builds-*
          merge-multiple: true
          path: dist
      - name: Create GitHub Release
        continue-on-error: true
        run: |
          FILES=(dist/*)
          if [ ${#FILES[@]} -eq 0 ] || [ "${FILES[0]}" = "dist/*" ]; then
            echo "Keine Artifakte gefunden — Release ohne Assets erstellen"
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "PrivacyShield ${{ github.ref_name }}" \
              --draft
          else
            echo "Artifakte gefunden: ${FILES[@]}"
            gh release create "${{ github.ref_name }}" "${FILES[@]}" \
              --title "${{ github.ref_name }}" \
              --notes "PrivacyShield ${{ github.ref_name }}" \
              --draft
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
