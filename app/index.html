<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PrivacyShield Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f5f5; font-family: system-ui, sans-serif; }
    #tool-frame { width: 100%; height: 100%; border: none; }

    #update-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fef3c7; border-top: 3px solid #f59e0b; color: #78350f;
      padding: 10px 20px; font-size: 13px;
      display: none; align-items: center; gap: 16px; z-index: 9999;
    }
    #update-banner .banner-text { flex: 1; }
    #update-banner .banner-title { font-weight: 600; margin-bottom: 2px; }
    #update-banner .banner-hint { font-size: 11px; color: #92400e; opacity: 0.8; }
    #update-banner .banner-actions { display: flex; gap: 8px; flex-shrink: 0; }
    #update-banner .btn-update {
      background: #d97706; color: #fff; border: none;
      padding: 7px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 13px;
    }
    #update-banner .btn-update:hover { background: #b45309; }
    #update-banner .btn-later {
      background: transparent; color: #92400e; border: 1px solid #d97706;
      padding: 7px 14px; border-radius: 5px; cursor: pointer; font-size: 13px;
    }
    #update-banner .btn-later:hover { background: #fde68a; }

    #forced-update-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.82); z-index: 99999;
      align-items: center; justify-content: center;
    }
    #forced-update-overlay .dialog {
      background: #fff; padding: 44px 48px; border-radius: 14px;
      max-width: 460px; width: 90%; text-align: center;
    }
    #forced-update-overlay h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #111; }
    #forced-update-overlay p { color: #555; margin-bottom: 28px; line-height: 1.55; font-size: 14px; }
    #forced-update-overlay .dialog-actions { display: flex; gap: 12px; justify-content: center; }
    #forced-update-overlay .btn-force-update {
      background: #1a3a5c; color: #fff; border: none;
      padding: 11px 28px; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 14px;
    }
    #forced-update-overlay .btn-force-update:hover { background: #14304e; }
    #forced-update-overlay .btn-force-update:disabled { opacity: 0.6; cursor: default; }
    #forced-update-overlay .btn-quit {
      background: transparent; color: #dc2626; border: 1px solid #dc2626;
      padding: 11px 20px; border-radius: 7px; cursor: pointer; font-size: 14px;
    }
    #forced-update-overlay .btn-quit:hover { background: #fef2f2; }
    #forced-update-overlay .btn-quit:disabled { opacity: 0.4; cursor: default; }

    #progress-wrap {
      display: none; margin-bottom: 20px;
    }
    #progress-label { font-size: 13px; color: #555; margin-bottom: 8px; }
    #progress-bar-bg {
      background: #e5e7eb; border-radius: 6px; height: 8px; overflow: hidden;
    }
    #progress-bar-fill {
      background: #1a3a5c; height: 100%; width: 0%; transition: width 0.3s ease; border-radius: 6px;
    }
    #download-error-msg {
      display: none; color: #dc2626; font-size: 13px; margin-bottom: 16px;
    }
    #install-msg {
      display: none; color: #16a34a; font-size: 13px; margin-bottom: 16px; font-weight: 600;
    }
  </style>
</head>
<body>
  <iframe id="tool-frame" src="privacy-shield.html" allow="clipboard-read; clipboard-write"></iframe>

  <div id="update-banner">
    <div class="banner-text">
      <div class="banner-title" id="banner-title"></div>
      <div class="banner-hint">Diese Meldung ist nur 3x wegklickbar, danach wird das Update durchgefuhrt.</div>
    </div>
    <div class="banner-actions">
      <button class="btn-later" id="btn-later" onclick="handleLater()">Spater</button>
      <button class="btn-update" onclick="handleUpdate()">Jetzt aktualisieren</button>
    </div>
  </div>

  <div id="forced-update-overlay">
    <div class="dialog">
      <h2>Update erforderlich</h2>
      <p id="forced-text"></p>
      <div id="progress-wrap">
        <div id="progress-label">Download... 0%</div>
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
      </div>
      <div id="download-error-msg">Download fehlgeschlagen — bitte versuchen Sie es spater erneut.</div>
      <div id="install-msg">Installation lauft, App wird neu gestartet...</div>
      <div class="dialog-actions" id="dialog-actions">
        <button class="btn-force-update" id="btn-force-update" onclick="handleForceUpdate()">Jetzt aktualisieren</button>
        <button class="btn-quit" id="btn-quit" onclick="handleQuit()">Programm schliessen</button>
      </div>
    </div>
  </div>

  <script>
    let pendingVersion = null;

    function showBanner(version, dismissCount) {
      pendingVersion = version;
      document.getElementById('banner-title').textContent =
        'Neue Version ' + version + ' verfugbar — jetzt aktualisieren';
      const btnLater = document.getElementById('btn-later');
      const remaining = 3 - dismissCount;
      btnLater.textContent = 'Spater (' + remaining + 'x)';
      document.getElementById('update-banner').style.display = 'flex';
    }

    function hideBanner() {
      document.getElementById('update-banner').style.display = 'none';
    }

    function showForcedDialog(version) {
      pendingVersion = version;
      document.getElementById('forced-text').textContent =
        'Update erforderlich — Diese Version ist veraltet. Bitte aktualisieren Sie auf Version ' +
        version + ', um PrivacyShield weiter zu nutzen.';
      document.getElementById('forced-update-overlay').style.display = 'flex';
    }

    async function handleLater() {
      if (!pendingVersion || !window.electronAPI) return;
      const { dismissCount } = await window.electronAPI.dismissUpdate(pendingVersion);
      hideBanner();
      if (dismissCount >= 3) {
        showForcedDialog(pendingVersion);
      }
    }

    async function handleUpdate() {
      hideBanner();
      if (window.electronAPI) {
        await window.electronAPI.startDownload();
      }
    }

    async function handleForceUpdate() {
      if (!window.electronAPI) return;
      document.getElementById('btn-force-update').disabled = true;
      document.getElementById('btn-quit').disabled = true;
      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('download-error-msg').style.display = 'none';
      await window.electronAPI.startDownload();
    }

    async function handleQuit() {
      if (window.electronAPI) {
        await window.electronAPI.quitApp();
      }
    }

    if (window.electronAPI) {
      window.electronAPI.onUpdateAvailable(({ version, dismissCount }) => {
        if (dismissCount >= 3) {
          showForcedDialog(version);
        } else {
          showBanner(version, dismissCount);
        }
      });

      window.electronAPI.onDownloadProgress((percent) => {
        document.getElementById('progress-wrap').style.display = 'block';
        document.getElementById('progress-label').textContent = 'Download... ' + percent + '%';
        document.getElementById('progress-bar-fill').style.width = percent + '%';
      });

      window.electronAPI.onUpdateDownloaded((version) => {
        document.getElementById('progress-wrap').style.display = 'none';
        document.getElementById('install-msg').style.display = 'block';
        document.getElementById('dialog-actions').style.display = 'none';
        document.getElementById('forced-update-overlay').style.display = 'flex';
      });

      window.electronAPI.onDownloadError(() => {
        document.getElementById('progress-wrap').style.display = 'none';
        document.getElementById('download-error-msg').style.display = 'block';
        const btnForce = document.getElementById('btn-force-update');
        const btnQuit = document.getElementById('btn-quit');
        if (btnForce) { btnForce.disabled = false; btnForce.textContent = 'Erneut versuchen'; }
        if (btnQuit) btnQuit.disabled = false;
        document.getElementById('dialog-actions').style.display = 'flex';
        document.getElementById('forced-update-overlay').style.display = 'flex';
      });
    }

    window.addEventListener('message', async (event) => {
      if (event.data && event.data.type === 'electron-save-file') {
        if (window.electronAPI) {
          const result = await window.electronAPI.saveFile(event.data.payload);
          if (event.source) event.source.postMessage({ type: 'electron-save-result', result }, '*');
        }
      }
      if (event.data && event.data.type === 'electron-open-file') {
        if (window.electronAPI) {
          const result = await window.electronAPI.openFile();
          if (event.source) event.source.postMessage({ type: 'electron-open-result', result }, '*');
        }
      }
    });
  </script>
</body>
</html>
